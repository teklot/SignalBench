          stroke="#00A2FF" stroke-width="140" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Data Points -->
    <circle cx="500" cy="200" r="25" fill="white"/>
    <circle cx="200" cy="824" r="25" fill="white"/>
    <circle cx="800" cy="200" r="25" fill="white"/>
    <circle cx="800" cy="824" r="25" fill="white"/>
    
