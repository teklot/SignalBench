<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Square with Rounded Corners -->
    <rect width="1024" height="1024" rx="160" fill="#1E1E1E"/>
    
    <!-- Subtle Grid Background (Bench) -->
    <path d="M200 200H824M200 400H824M200 600H824M200 824H824M200 200V824M400 200V824M600 200V824M824 200V824" 
          stroke="#333333" stroke-width="4"/>

    <!-- Main Signal Wave (The "S" shape integrated with a pulse) -->
    <path d="M200 600C300 600 350 200 450 200C550 200 600 824 700 824C800 824 850 600 950 600" 
          stroke="#00A2FF" stroke-width="60" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Secondary "Bench" Accent -->
    <path d="M150 850H874" stroke="#00FFC2" stroke-width="40" stroke-linecap="round"/>
    
    <!-- Data "Bits" or Pulse Accents -->
    <circle cx="450" cy="200" r="40" fill="#FFFFFF"/>
    <circle cx="700" cy="824" r="40" fill="#FFFFFF"/>
</svg>
